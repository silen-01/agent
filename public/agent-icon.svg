<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон — светлый градиент -->
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <!-- Иконка: скруглённый квадрат с градиентом (как фон, но насыщенно) + волна -->
  <rect x="8" y="8" width="32" height="32" rx="10" fill="url(#icon)"/>
  <path d="M16 26 L20 22 L24 26 L28 22 L32 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
</svg>
